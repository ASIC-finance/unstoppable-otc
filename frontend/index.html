<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4f6f1" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#10140f" media="(prefers-color-scheme: dark)" />
    <script>
      (function () {
        var t = localStorage.getItem('theme-preference');
        var dark = t === 'dark' || (t !== 'light' && matchMedia('(prefers-color-scheme:dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
    <meta
      name="description"
      content="Unstoppable OTC is a self-custodial interface for creating, browsing, and settling OTC token orders."
    />
    <title>Unstoppable OTC</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
